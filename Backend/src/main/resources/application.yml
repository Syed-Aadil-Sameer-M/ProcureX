spring:
  application:
    name: procurex-backend
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/procurex_db
    username: postgres
    password: your_actual_postgresql_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
server:
  port: 8080
