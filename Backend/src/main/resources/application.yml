spring:
  application:
    name: procurex-backend
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/ProcureX_DB
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: always
      schema-locations: file:../database/schema.sql
      data-locations: file:../database/seed.sql
server:
  address: 0.0.0.0
  port: 8080
jwt:
  secret: ${JWT_SECRET:default-secret-key-that-should-be-at-least-256-bits-long-for-hs256-algorithm}
